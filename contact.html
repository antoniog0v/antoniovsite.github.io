<!-- CONTACT FORM -->

<section class="pb-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form id = "contactForm" action="https://formspree.io/f/meerglvg" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Your name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Your email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" id="message" name="message" rows="5" placeholder="Your message"></textarea>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- JAVASCRIPT FOR FORM VALIDATION -->

<script>
    document.getElementById("contactForm").addEventListener("submit", function(event){
        let name=document.getElementById("name").value.trim();
        let email=document.getElementById("email").value.trim();
        let message=document.getElementById("message").value.trim();
        if(name===""||email===""||message===""){
            alert("Please fill out all fields before sending your message.");
            event.preventDefault();
            return;
        }
        let emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(!emailPattern.test(email)){
            alert("Please enter a valid email address.");
            event.preventDefault();
            return;
        }
    });

</script>
